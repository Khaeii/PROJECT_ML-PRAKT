<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Classifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F2EA;
    --card:#FFFFFF;
    --ink:#233240;
    --muted:#7C8A97;
    --blue:#2F6FA8;
    --blue-deep:#1C3F63;
    --sky:#BFE0F0;
    --sun:#F4A94A;
    --line:#E8E1D3;
    --good:#4CAF7D;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); font-family:'Poppins',sans-serif; color:var(--ink);
    display:flex; justify-content:center; padding:24px 12px;
  }
  .phone{
    width:100%; max-width:420px; background:var(--card); border-radius:32px;
    overflow:hidden; box-shadow:0 20px 50px rgba(28,63,99,0.15); border:1px solid var(--line);
  }
  .sky{
    padding:26px 22px 34px; color:#fff; position:relative; overflow:hidden;
    background:linear-gradient(160deg,var(--blue) 0%, var(--blue-deep) 100%);
    transition:background 0.6s ease;
  }
  .sky.Sunny{background:linear-gradient(160deg,#F7B95B 0%, #E88A3A 100%);}
  .sky.Cloudy{background:linear-gradient(160deg,#8FA3B0 0%, #57707E 100%);}
  .sky.Rainy{background:linear-gradient(160deg,#3E7CB1 0%, #1C3F63 100%);}
  .sky.Snowy{background:linear-gradient(160deg,#7FB8D9 0%, #3E6E8E 100%);}
  .sky h1{margin:0; font-size:15px; font-weight:600; letter-spacing:0.4px; opacity:0.85;}
  .sky .headline{display:flex; align-items:center; gap:14px; margin-top:14px;}
  .sky .icon{font-size:44px; line-height:1;}
  .sky .pred{font-size:26px; font-weight:700;}
  .sky .conf{font-size:13px; opacity:0.85; font-weight:400;}

  .body-content{padding:20px;}
  .section-title{font-size:13px; font-weight:600; color:var(--blue-deep); text-transform:uppercase; letter-spacing:0.6px; margin:18px 0 10px;}
  .section-title:first-child{margin-top:0;}

  .field{margin-bottom:14px;}
  .field label{display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:6px;}
  .field label b{color:var(--ink); font-weight:600;}
  input[type=range]{
    -webkit-appearance:none; width:100%; height:6px; border-radius:6px;
    background:var(--line); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:var(--blue); border:3px solid #fff; box-shadow:0 2px 6px rgba(47,111,168,0.4); cursor:pointer;
  }
  select{
    width:100%; padding:11px 12px; border-radius:14px; border:1.5px solid var(--line);
    font-family:'Poppins',sans-serif; font-size:14px; color:var(--ink); background:#FBF9F5;
    appearance:none; -webkit-appearance:none;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%237C8A97"/></svg>');
    background-repeat:no-repeat; background-position:right 14px center;
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  .predict-btn{
    width:100%; padding:15px; margin-top:6px; border:none; border-radius:16px; cursor:pointer;
    background:linear-gradient(135deg,var(--blue),var(--blue-deep)); color:#fff;
    font-family:'Poppins',sans-serif; font-weight:600; font-size:15px; letter-spacing:0.3px;
    box-shadow:0 10px 24px rgba(47,111,168,0.35); transition:transform 0.15s ease;
  }
  .predict-btn:active{transform:scale(0.97);}
  .predict-btn:disabled{opacity:0.6; cursor:default;}

  .result-card{
    margin-top:18px; border-radius:18px; background:#FBF9F5; border:1px solid var(--line);
    padding:16px; display:none;
  }
  .result-card.show{display:block; animation:fadeUp 0.4s ease;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .bar-row{display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12.5px;}
  .bar-row .name{width:52px; color:var(--muted); font-weight:500;}
  .bar-track{flex:1; height:9px; background:var(--line); border-radius:6px; overflow:hidden;}
  .bar-fill{height:100%; border-radius:6px; background:var(--blue); transition:width 0.5s ease;}
  .bar-pct{width:42px; text-align:right; color:var(--ink); font-weight:600;}

  .model-note{margin-top:12px; font-size:11.5px; color:var(--muted); text-align:center;}

  .history{margin-top:8px; max-height:220px; overflow-y:auto;}
  .hist-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:14px;
    background:#FBF9F5; border:1px solid var(--line); margin-bottom:8px; font-size:12.5px;
  }
  .hist-icon{font-size:20px;}
  .hist-main{flex:1;}
  .hist-main .p{font-weight:600; color:var(--ink);}
  .hist-main .s{color:var(--muted); font-size:11px;}
  .hist-conf{font-weight:700; color:var(--blue-deep); font-size:12.5px;}
  .empty{color:var(--muted); font-size:12.5px; text-align:center; padding:14px 0;}

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
</style>
</head>
<body>

<div class="phone">
  <div class="sky" id="skyBanner">
    <h1>Weather Classifier</h1>
    <div class="headline">
      <div class="icon" id="skyIcon">🌤️</div>
      <div>
        <div class="pred" id="skyPred">Siap memprediksi</div>
        <div class="conf" id="skyConf">Atur parameter lalu tekan Prediksi</div>
      </div>
    </div>
  </div>

  <div class="body-content">
    <div class="section-title">Parameter Cuaca</div>

    <div class="field">
      <label>Suhu <b id="v_temp">25 °C</b></label>
      <input type="range" id="temp" min="-20" max="55" value="25">
    </div>
    <div class="field">
      <label>Kelembapan <b id="v_hum">70 %</b></label>
      <input type="range" id="hum" min="0" max="100" value="70">
    </div>
    <div class="field">
      <label>Kecepatan Angin <b id="v_wind">15 km/h</b></label>
      <input type="range" id="wind" min="0" max="150" value="15">
    </div>
    <div class="field">
      <label>Presipitasi <b id="v_prec">40 %</b></label>
      <input type="range" id="prec" min="0" max="100" value="40">
    </div>
    <div class="field">
      <label>UV Index <b id="v_uv">5</b></label>
      <input type="range" id="uv" min="0" max="15" value="5">
    </div>
    <div class="field">
      <label>Visibilitas <b id="v_vis">10 km</b></label>
      <input type="range" id="vis" min="0" max="50" value="10">
    </div>

    <div class="grid2">
      <select id="cloud">
        <option value="clear">Clear</option>
        <option value="partly cloudy" selected>Partly Cloudy</option>
        <option value="cloudy">Cloudy</option>
        <option value="overcast">Overcast</option>
      </select>
      <select id="season">
        <option>Spring</option>
        <option selected>Summer</option>
        <option>Autumn</option>
        <option>Winter</option>
      </select>
    </div>
    <div class="grid2" style="margin-top:12px;">
      <select id="location">
        <option>coastal</option>
        <option selected>inland</option>
        <option>mountain</option>
      </select>
      <select id="model">
        <option value="best" selected>Best (otomatis)</option>
        <option value="model1">Model 1</option>
        <option value="model2">Model 2</option>
      </select>
    </div>

    <button class="predict-btn" id="predictBtn" onclick="runPredict()">Prediksi Cuaca</button>

    <div class="result-card" id="resultCard">
      <div id="barsWrap"></div>
      <div class="model-note" id="modelNote"></div>
    </div>

    <div class="section-title">Riwayat Tes</div>
    <div class="history" id="historyList">
      <div class="empty">Belum ada tes yang dilakukan</div>
    </div>
  </div>
</div>

<script>
const ICONS = {Sunny:"☀️", Cloudy:"☁️", Rainy:"🌧️", Snowy:"❄️"};
const ACC = {model1:87.4, model2:90.1};
let history = [];

// ── binding label slider ──
const bind = (id,suffix,label)=>{
  const el=document.getElementById(id);
  const lbl=document.getElementById(label);
  const upd=()=>lbl.textContent=`${el.value}${suffix}`;
  el.addEventListener('input',upd); upd();
};
bind('temp',' °C','v_temp');
bind('hum',' %','v_hum');
bind('wind',' km/h','v_wind');
bind('prec',' %','v_prec');
bind('uv','','v_uv');
bind('vis',' km','v_vis');

function softmax(scores){
  const vals=Object.values(scores); const m=Math.max(...vals);
  const exps={}; let s=0;
  for(const k in scores){ exps[k]=Math.exp(scores[k]-m); s+=exps[k]; }
  const out={}; for(const k in exps) out[k]=exps[k]/s*100;
  return out;
}

function scoreWeather(p, jitter){
  const {temp,hum,wind,prec,uv,vis,cloud,season}=p;
  let s={Sunny:0,Cloudy:0,Rainy:0,Snowy:0};

  if(temp<=0) s.Snowy+=3; else if(temp<10){s.Snowy+=1; s.Cloudy+=0.5;} else if(temp>28) s.Sunny+=1.5;

  s.Rainy += prec/25; s.Cloudy += prec/40;
  if(cloud==='clear') s.Sunny+=2;
  else if(cloud==='partly cloudy'){ s.Sunny+=0.8; s.Cloudy+=0.6; }
  else if(cloud==='cloudy') s.Cloudy+=1.6;
  else if(cloud==='overcast'){ s.Cloudy+=1.2; s.Rainy+=1; }

  s.Sunny += uv/8;
  s.Sunny += Math.max(0, vis-20)/15;
  s.Rainy += Math.max(0, 20-vis)/12;
  s.Rainy += Math.max(0, hum-60)/20;
  s.Sunny += Math.max(0, 40-hum)/25;
  s.Cloudy += wind/60;

  if(season==='Winter'){ s.Snowy += temp<5?2:0.5; s.Cloudy+=0.5; }
  else if(season==='Summer') s.Sunny+=1.2;
  else if(season==='Autumn'){ s.Cloudy+=0.6; s.Rainy+=0.4; }
  else if(season==='Spring') s.Rainy+=0.3;

  if(temp>3) s.Snowy*=0.15;

  for(const k in s) s[k]+= (Math.random()*0.6-0.3) + jitter;
  return s;
}

function localPredict(payload){
  const p1=softmax(scoreWeather(payload,0));
  const p2=softmax(scoreWeather(payload, Math.random()*0.8-0.4));
  const pred1=Object.keys(p1).reduce((a,b)=>p1[a]>p1[b]?a:b);
  const pred2=Object.keys(p2).reduce((a,b)=>p2[a]>p2[b]?a:b);
  const best = ACC.model1>=ACC.model2 ? 'model1':'model2';
  const bestProb = best==='model1'?p1:p2, bestPred= best==='model1'?pred1:pred2;

  let finalProb,finalPred,used;
  if(payload.model_choice==='model1'){ finalProb=p1; finalPred=pred1; used='model1'; }
  else if(payload.model_choice==='model2'){ finalProb=p2; finalPred=pred2; used='model2'; }
  else { finalProb=bestProb; finalPred=bestPred; used=best; }

  return {
    prediction:finalPred, confidence:finalProb[finalPred], probabilities:finalProb, model_used:used,
    model1:{prediction:pred1, confidence:p1[pred1], acc:ACC.model1},
    model2:{prediction:pred2, confidence:p2[pred2], acc:ACC.model2}
  };
}

function runPredict(){
  const btn=document.getElementById('predictBtn');
  btn.disabled=true; btn.textContent='Menganalisis...';

  const payload={
    temp:+temp.value, hum:+hum.value, wind:+wind.value, prec:+prec.value,
    uv:+uv.value, vis:+vis.value, cloud:cloud.value, season:season.value,
    location:location.value, model_choice:model.value
  };

  setTimeout(()=>{
    const r=localPredict(payload);
    showResult(r);
    btn.disabled=false; btn.textContent='Prediksi Cuaca';
  }, 550);
}

function showResult(r){
  // sky banner
  const sky=document.getElementById('skyBanner');
  sky.className='sky '+r.prediction;
  document.getElementById('skyIcon').textContent=ICONS[r.prediction];
  document.getElementById('skyPred').textContent=r.prediction;
  document.getElementById('skyConf').textContent=`Confidence ${r.confidence.toFixed(1)}%  ·  ${r.model_used.toUpperCase()}`;

  // bars
  const wrap=document.getElementById('barsWrap');
  wrap.innerHTML='';
  const sorted=Object.entries(r.probabilities).sort((a,b)=>b[1]-a[1]);
  for(const [cls,val] of sorted){
    wrap.innerHTML += `
      <div class="bar-row">
        <div class="name">${cls}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${val}%"></div></div>
        <div class="bar-pct">${val.toFixed(1)}%</div>
      </div>`;
  }
  document.getElementById('modelNote').textContent =
    `M1: ${r.model1.prediction} (${r.model1.confidence.toFixed(1)}%, acc ${r.model1.acc}%)  ·  M2: ${r.model2.prediction} (${r.model2.confidence.toFixed(1)}%, acc ${r.model2.acc}%)`;

  document.getElementById('resultCard').classList.add('show');

  // history
  const time=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  history.unshift({pred:r.prediction, conf:r.confidence, model:r.model_used, time});
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById('historyList');
  if(history.length===0){ el.innerHTML='<div class="empty">Belum ada tes yang dilakukan</div>'; return; }
  el.innerHTML = history.slice(0,8).map(h=>`
    <div class="hist-item">
      <div class="hist-icon">${ICONS[h.pred]}</div>
      <div class="hist-main">
        <div class="p">${h.pred}</div>
        <div class="s">${h.time} · ${h.model.toUpperCase()}</div>
      </div>
      <div class="hist-conf">${h.conf.toFixed(1)}%</div>
    </div>`).join('');
}
</script>
</body>
</html>
