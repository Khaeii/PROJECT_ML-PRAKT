<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Classifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F2EA;
    --card:#FFFFFF;
    --ink:#233240;
    --muted:#7C8A97;
    --blue:#2F6FA8;
    --blue-deep:#1C3F63;
    --sky:#BFE0F0;
    --sun:#F4A94A;
    --line:#E8E1D3;
    --good:#4CAF7D;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); font-family:'Poppins',sans-serif; color:var(--ink);
    display:flex; justify-content:center; padding:24px 12px;
  }
  .phone{
    width:100%; max-width:420px; background:var(--card); border-radius:32px;
    overflow:hidden; box-shadow:0 20px 50px rgba(28,63,99,0.15); border:1px solid var(--line);
  }

  /* ── SKY BANNER ── */
  .sky{
    padding:26px 22px 34px; color:#fff; position:relative; overflow:hidden;
    background:linear-gradient(160deg,var(--blue) 0%, var(--blue-deep) 100%);
    transition:background 0.6s ease;
  }
  .sky.Sunny  {background:linear-gradient(160deg,#F7B95B 0%,#E88A3A 100%);}
  .sky.Cloudy {background:linear-gradient(160deg,#8FA3B0 0%,#57707E 100%);}
  .sky.Rainy  {background:linear-gradient(160deg,#3E7CB1 0%,#1C3F63 100%);}
  .sky.Snowy  {background:linear-gradient(160deg,#7FB8D9 0%,#3E6E8E 100%);}
  .sky h1{margin:0; font-size:15px; font-weight:600; letter-spacing:0.4px; opacity:0.85;}
  .sky .headline{display:flex; align-items:center; gap:14px; margin-top:14px;}
  .sky .icon{font-size:44px; line-height:1;}
  .sky .pred{font-size:26px; font-weight:700;}
  .sky .conf{font-size:13px; opacity:0.85; font-weight:400; margin-top:2px;}

  /* status koneksi kecil di pojok kanan atas banner */
  .conn-badge{
    position:absolute; top:18px; right:18px;
    display:flex; align-items:center; gap:5px;
    font-size:11px; opacity:0.9; font-weight:500;
  }
  .conn-dot{
    width:8px; height:8px; border-radius:50%;
    background:#ccc; transition:background 0.4s;
  }
  .conn-dot.ok {background:#6EE7A0;}
  .conn-dot.err{background:#FF7979;}

  /* ── BODY ── */
  .body-content{padding:20px;}
  .section-title{
    font-size:13px; font-weight:600; color:var(--blue-deep);
    text-transform:uppercase; letter-spacing:0.6px; margin:18px 0 10px;
  }
  .section-title:first-child{margin-top:0;}

  /* SLIDERS */
  .field{margin-bottom:14px;}
  .field label{display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:6px;}
  .field label b{color:var(--ink); font-weight:600;}
  input[type=range]{
    -webkit-appearance:none; width:100%; height:6px; border-radius:6px;
    background:var(--line); outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:var(--blue); border:3px solid #fff;
    box-shadow:0 2px 6px rgba(47,111,168,0.4); cursor:pointer;
  }

  /* SELECTS */
  select{
    width:100%; padding:11px 12px; border-radius:14px;
    border:1.5px solid var(--line);
    font-family:'Poppins',sans-serif; font-size:14px;
    color:var(--ink); background:#FBF9F5;
    appearance:none; -webkit-appearance:none;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%237C8A97"/></svg>');
    background-repeat:no-repeat; background-position:right 14px center;
    cursor:pointer;
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  /* PRESSURE FIELD */
  .pressure-wrap{display:flex; align-items:center; gap:8px;}
  .pressure-wrap input[type=number]{
    width:110px; padding:9px 10px; border-radius:12px;
    border:1.5px solid var(--line); font-family:'Poppins',sans-serif;
    font-size:14px; color:var(--ink); background:#FBF9F5; outline:none;
  }
  .pressure-wrap span{font-size:13px; color:var(--muted);}

  /* TOMBOL */
  .predict-btn{
    width:100%; padding:15px; margin-top:6px; border:none;
    border-radius:16px; cursor:pointer;
    background:linear-gradient(135deg,var(--blue),var(--blue-deep));
    color:#fff; font-family:'Poppins',sans-serif;
    font-weight:600; font-size:15px; letter-spacing:0.3px;
    box-shadow:0 10px 24px rgba(47,111,168,0.35);
    transition:transform 0.15s ease, opacity 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .predict-btn:active{transform:scale(0.97);}
  .predict-btn:disabled{opacity:0.6; cursor:default;}
  .spinner{
    width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.4);
    border-top-color:#fff; border-radius:50%;
    animation:spin 0.7s linear infinite; display:none;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* RESULT CARD */
  .result-card{
    margin-top:18px; border-radius:18px; background:#FBF9F5;
    border:1px solid var(--line); padding:16px; display:none;
  }
  .result-card.show{display:block; animation:fadeUp 0.4s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .bar-row{display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12.5px;}
  .bar-row .name{width:60px; color:var(--muted); font-weight:500;}
  .bar-track{flex:1; height:9px; background:var(--line); border-radius:6px; overflow:hidden;}
  .bar-fill{height:100%; border-radius:6px; background:var(--blue); transition:width 0.55s ease;}
  .bar-pct{width:44px; text-align:right; color:var(--ink); font-weight:600;}

  /* detail kedua model */
  .model-compare{
    margin-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
  .model-box{
    background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:10px 12px; font-size:11.5px;
  }
  .model-box .mname{font-weight:700; font-size:12px; color:var(--blue-deep); margin-bottom:4px;}
  .model-box .mrow{color:var(--muted); line-height:1.8;}
  .model-box .mrow b{color:var(--ink);}
  .model-box.active-model{border-color:var(--blue); background:#EBF4FC;}

  .model-note{margin-top:10px; font-size:11px; color:var(--muted); text-align:center;}

  /* ERROR TOAST */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:#FF5C5C; color:#fff; padding:12px 20px; border-radius:14px;
    font-size:13px; font-weight:500; max-width:360px; text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
    transition:transform 0.35s ease, opacity 0.35s ease; opacity:0; z-index:999;
  }
  .toast.show{transform:translateX(-50%) translateY(0); opacity:1;}

  /* HISTORY */
  .history{margin-top:8px; max-height:220px; overflow-y:auto;}
  .hist-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border-radius:14px; background:#FBF9F5; border:1px solid var(--line);
    margin-bottom:8px; font-size:12.5px;
  }
  .hist-icon{font-size:20px;}
  .hist-main{flex:1;}
  .hist-main .p{font-weight:600; color:var(--ink);}
  .hist-main .s{color:var(--muted); font-size:11px;}
  .hist-conf{font-weight:700; color:var(--blue-deep); font-size:12.5px;}
  .empty{color:var(--muted); font-size:12.5px; text-align:center; padding:14px 0;}

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
</style>
</head>
<body>

<div class="phone">

  <!-- ── BANNER ── -->
  <div class="sky" id="skyBanner">
    <div class="conn-badge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connTxt">Menghubungkan…</span>
    </div>
    <h1>Weather Classifier</h1>
    <div class="headline">
      <div class="icon" id="skyIcon">🌤️</div>
      <div>
        <div class="pred" id="skyPred">Siap memprediksi</div>
        <div class="conf" id="skyConf">Atur parameter lalu tekan Prediksi</div>
      </div>
    </div>
  </div>

  <div class="body-content">

    <!-- ── PARAMETER ── -->
    <div class="section-title">Parameter Cuaca</div>

    <div class="field">
      <label>Suhu <b id="v_temp">25 °C</b></label>
      <input type="range" id="temp" min="-20" max="55" value="25">
    </div>
    <div class="field">
      <label>Kelembapan <b id="v_hum">70 %</b></label>
      <input type="range" id="hum" min="0" max="100" value="70">
    </div>
    <div class="field">
      <label>Kecepatan Angin <b id="v_wind">15 km/h</b></label>
      <input type="range" id="wind" min="0" max="150" value="15">
    </div>
    <div class="field">
      <label>Presipitasi <b id="v_prec">40 %</b></label>
      <input type="range" id="prec" min="0" max="100" value="40">
    </div>
    <div class="field">
      <label>UV Index <b id="v_uv">5</b></label>
      <input type="range" id="uv" min="0" max="15" value="5">
    </div>
    <div class="field">
      <label>Visibilitas <b id="v_vis">10 km</b></label>
      <input type="range" id="vis" min="0" max="50" value="10">
    </div>

    <!-- Tekanan Udara — pakai number input karena range-nya sempit -->
    <div class="field">
      <label>Tekanan Udara <b id="v_pres">1013 hPa</b></label>
      <input type="range" id="pres" min="950" max="1050" value="1013">
    </div>

    <!-- Dropdowns baris 1 -->
    <div class="grid2">
      <select id="cloud">
        <option value="clear">Clear</option>
        <option value="partly cloudy" selected>Partly Cloudy</option>
        <option value="cloudy">Cloudy</option>
        <option value="overcast">Overcast</option>
      </select>
      <select id="season">
        <option>Spring</option>
        <option selected>Summer</option>
        <option>Autumn</option>
        <option>Winter</option>
      </select>
    </div>

    <!-- Dropdowns baris 2 -->
    <div class="grid2" style="margin-top:12px;">
      <select id="location">
        <option>coastal</option>
        <option selected>inland</option>
        <option>mountain</option>
      </select>
      <select id="modelSel">
        <option value="best" selected>Best (otomatis)</option>
        <option value="model1">Model 1 — ANN</option>
        <option value="model2">Model 2 — Wide&Deep</option>
      </select>
    </div>

    <!-- TOMBOL PREDIKSI -->
    <button class="predict-btn" id="predictBtn" onclick="runPredict()">
      <div class="spinner" id="spin"></div>
      <span id="btnTxt">Prediksi Cuaca</span>
    </button>

    <!-- RESULT CARD -->
    <div class="result-card" id="resultCard">
      <div id="barsWrap"></div>
      <div class="model-compare" id="modelCompare"></div>
      <div class="model-note" id="modelNote"></div>
    </div>

    <!-- HISTORY -->
    <div class="section-title">Riwayat Tes</div>
    <div class="history" id="historyList">
      <div class="empty">Belum ada tes yang dilakukan</div>
    </div>

  </div><!-- end body-content -->
</div><!-- end phone -->

<!-- TOAST ERROR -->
<div class="toast" id="toast"></div>

<script>

const API = "http://127.0.0.1:8000";

const ICONS = {Sunny:"☀️", Cloudy:"☁️", Rainy:"🌧️", Snowy:"❄️"};
let histList = [];

function bindSlider(id, suffix, labelId){
  const el = document.getElementById(id);
  const lb = document.getElementById(labelId);
  const upd = () => lb.textContent = el.value + " " + suffix;
  el.addEventListener("input", upd);
  upd();
}
bindSlider("temp",  "°C",   "v_temp");
bindSlider("hum",   "%",    "v_hum");
bindSlider("wind",  "km/h", "v_wind");
bindSlider("prec",  "%",    "v_prec");
bindSlider("uv",    "",     "v_uv");
bindSlider("vis",   "km",   "v_vis");
bindSlider("pres",  "hPa",  "v_pres");


async function checkConn(){
  const dot = document.getElementById("connDot");
  const txt = document.getElementById("connTxt");
  try {
    const r = await fetch(API + "/health", {signal: AbortSignal.timeout(3000)});
    if(r.ok){
      dot.className = "conn-dot ok";
      txt.textContent = "Terhubung ✓";
    } else {
      throw new Error("not ok");
    }
  } catch {
    dot.className = "conn-dot err";
    txt.textContent = "Offline";
  }
}
checkConn();
setInterval(checkConn, 10000);

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 4000);
}

async function runPredict(){
  const btn  = document.getElementById("predictBtn");
  const spin = document.getElementById("spin");
  const txt  = document.getElementById("btnTxt");

  btn.disabled = true;
  spin.style.display = "block";
  txt.textContent = "Menganalisis…";

  const payload = {
    temperature: +document.getElementById("temp").value,
    humidity: +document.getElementById("hum").value,
    wind_speed: +document.getElementById("wind").value,
    precipitation: +document.getElementById("prec").value,
    atmospheric_pressure: +document.getElementById("pres").value,
    uv_index: +document.getElementById("uv").value,
    visibility_km: +document.getElementById("vis").value,
    cloud_cover: document.getElementById("cloud").value,
    season: document.getElementById("season").value,
    location: document.getElementById("location").value,
    model_choice: document.getElementById("modelSel").value,
  };

  try {
    const resp = await fetch(API + "/predict", {
      method:  "POST",
      headers: {"Content-Type": "application/json"},
      body:    JSON.stringify(payload),
      signal:  AbortSignal.timeout(15000),  // timeout 15 detik
    });

    if(!resp.ok){
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }

    const result = await resp.json();
    showResult(result);

  } catch(e) {
    let msg = e.message || "Terjadi kesalahan";
    if(msg.includes("Failed to fetch") || msg.includes("NetworkError") || msg.includes("AbortError")){
      msg = "Tidak bisa terhubung ke server.\n\nPastikan backend sudah jalan:\nuvicorn backend.backend:app --port 8000";
    }
    showToast("⚠️ " + msg);
    // Update conn status
    document.getElementById("connDot").className = "conn-dot err";
    document.getElementById("connTxt").textContent = "Offline";
  } finally {
    btn.disabled = false;
    spin.style.display = "none";
    txt.textContent = "Prediksi Cuaca";
  }
}

function showResult(r){
  // Banner atas
  const sky = document.getElementById("skyBanner");
  sky.className = "sky " + r.prediction;
  document.getElementById("skyIcon").textContent = ICONS[r.prediction] || "🌡️";
  document.getElementById("skyPred").textContent = r.prediction;
  document.getElementById("skyConf").textContent =
    `Confidence ${r.confidence.toFixed ? r.confidence.toFixed(1) : r.confidence}%  ·  ${r.model_used.toUpperCase()}`;

  const wrap = document.getElementById("barsWrap");
  wrap.innerHTML = "";
  const sorted = Object.entries(r.probabilities).sort((a,b)=>b[1]-a[1]);
  for(const [cls, val] of sorted){
    wrap.innerHTML += `
      <div class="bar-row">
        <div class="name">${cls}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${val}%"></div>
        </div>
        <div class="bar-pct">${typeof val === "number" ? val.toFixed(1) : val}%</div>
      </div>`;
  }

  // Kotak detail kedua model
  const mc = document.getElementById("modelCompare");
  const m1 = r.model1_detail, m2 = r.model2_detail;
  const active1 = r.model_used === "model1" ? "active-model" : "";
  const active2 = r.model_used === "model2" ? "active-model" : "";
  mc.innerHTML = `
    <div class="model-box ${active1}">
      <div class="mname">Model 1 — ANN ${r.model_used==="model1"?"✓":""}</div>
      <div class="mrow">
        Prediksi: <b>${m1.prediction}</b><br>
        Conf: <b>${m1.confidence.toFixed ? m1.confidence.toFixed(1) : m1.confidence}%</b><br>
        Test Acc: <b>${m1.test_accuracy}%</b>
      </div>
    </div>
    <div class="model-box ${active2}">
      <div class="mname">Model 2 — W&D ${r.model_used==="model2"?"✓":""}</div>
      <div class="mrow">
        Prediksi: <b>${m2.prediction}</b><br>
        Conf: <b>${m2.confidence.toFixed ? m2.confidence.toFixed(1) : m2.confidence}%</b><br>
        Test Acc: <b>${m2.test_accuracy}%</b>
      </div>
    </div>`;

  document.getElementById("modelNote").textContent =
    r.model_used === "best"
      ? `Model dipilih otomatis berdasarkan akurasi tertinggi`
      : `Menggunakan ${r.model_used.toUpperCase()} sesuai pilihan`;

  document.getElementById("resultCard").classList.add("show");

  // Tambah ke riwayat
  const time = new Date().toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
  histList.unshift({pred: r.prediction, conf: r.confidence, model: r.model_used, time});
  renderHistory();
}

function renderHistory(){
  const el = document.getElementById("historyList");
  if(histList.length === 0){
    el.innerHTML = '<div class="empty">Belum ada tes yang dilakukan</div>';
    return;
  }
  el.innerHTML = histList.slice(0, 8).map(h => `
    <div class="hist-item">
      <div class="hist-icon">${ICONS[h.pred] || "🌡️"}</div>
      <div class="hist-main">
        <div class="p">${h.pred}</div>
        <div class="s">${h.time} · ${h.model.toUpperCase()}</div>
      </div>
      <div class="hist-conf">${typeof h.conf === "number" ? h.conf.toFixed(1) : h.conf}%</div>
    </div>`).join("");
}
</script>
</body>
</html>
